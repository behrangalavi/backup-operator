apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "backup-operator.fullname" . }}
  labels: {{- include "backup-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {{- include "backup-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "backup-operator.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "backup-operator.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backup-operator
          image: "{{ .Values.image.repository }}{{ if .Values.image.digest }}@{{ .Values.image.digest }}{{ else }}:{{ .Values.image.tag | default .Chart.AppVersion }}{{ end }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef: { fieldPath: metadata.namespace }
            - name: WATCH_NAMESPACE
              value: {{ .Values.watchNamespace | default .Release.Namespace | quote }}
            - name: LEADER_ELECTION_ID
              value: {{ .Values.config.leaderElectionId | quote }}
            - name: DEFAULT_SCHEDULE
              value: {{ .Values.config.defaultSchedule | quote }}
            - name: RUN_TIMEOUT_SECONDS
              value: {{ .Values.config.runTimeoutSeconds | quote }}
            - name: TEMP_DIR
              value: {{ .Values.config.tempDir | quote }}
            - name: TEMP_DIR_SIZE
              value: {{ .Values.tempDirSize | quote }}
            - name: DEFAULT_RETENTION_DAYS
              value: {{ .Values.config.defaultRetentionDays | quote }}
            - name: DEFAULT_MIN_KEEP
              value: {{ .Values.config.defaultMinKeep | quote }}
            # Worker pod template — reconciler bakes these into every CronJob it produces.
            - name: WORKER_IMAGE
              value: "{{ .Values.image.repository }}{{ if .Values.image.digest }}@{{ .Values.image.digest }}{{ else }}:{{ .Values.image.tag | default .Chart.AppVersion }}{{ end }}"
            - name: WORKER_IMAGE_PULL_POLICY
              value: {{ .Values.image.pullPolicy | quote }}
            - name: WORKER_SERVICE_ACCOUNT
              value: {{ include "backup-operator.fullname" . }}-worker
            - name: AGE_SECRET_NAME
              value: {{ include "backup-operator.fullname" . }}-age
            {{- with .Values.workerResources }}
            {{- if .limits }}
            {{- if .limits.cpu }}
            - name: WORKER_CPU_LIMIT
              value: {{ .limits.cpu | quote }}
            {{- end }}
            {{- if .limits.memory }}
            - name: WORKER_MEMORY_LIMIT
              value: {{ .limits.memory | quote }}
            {{- end }}
            {{- end }}
            {{- if .requests }}
            {{- if .requests.cpu }}
            - name: WORKER_CPU_REQUEST
              value: {{ .requests.cpu | quote }}
            {{- end }}
            {{- if .requests.memory }}
            - name: WORKER_MEMORY_REQUEST
              value: {{ .requests.memory | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- if .Values.ui.enabled }}
            - name: UI_ENABLED
              value: "true"
            - name: UI_ADDR
              value: ":{{ .Values.ui.port }}"
            - name: SETTINGS_CONFIGMAP
              value: {{ include "backup-operator.fullname" . }}-settings
            - name: UI_READ_ONLY
              value: {{ .Values.ui.readOnly | default false | quote }}
            - name: UI_ALLOW_KEY_MUTATION
              value: {{ .Values.ui.allowKeyMutation | default false | quote }}
            {{- with .Values.ui.maxBodyBytes }}
            - name: UI_MAX_BODY_BYTES
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.ui.maxSSEClients }}
            - name: UI_MAX_SSE_CLIENTS
              value: {{ . | quote }}
            {{- end }}
            {{- end }}
            {{- /* Alerts integration: with prometheusURL set, /api/alerts
                   mirrors what Alertmanager will route. Without it the UI
                   falls back to a local heuristic over our own metrics.
                   Both blocks are optional — Alertmanager isn't required
                   for this chart. The (deref) form short-circuits to nil
                   when `alerts:` is absent (e.g. helm upgrade --reuse-values
                   from a pre-alerts release). */}}
            {{- with (.Values.alerts).prometheusURL }}
            - name: PROMETHEUS_URL
              value: {{ . | trim | quote }}
            {{- end }}
            {{- with (.Values.alerts).alertmanagerURL }}
            - name: ALERTMANAGER_URL
              value: {{ . | trim | quote }}
            {{- end }}
            {{- if .Values.docs.enabled }}
            - name: DOCS_ENABLED
              value: "true"
            - name: DOCS_ADDR
              value: ":{{ .Values.docs.port }}"
            - name: DOCS_DIR
              value: {{ .Values.docs.dir | default "/app/docs" | quote }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8082
              protocol: TCP
            {{- if .Values.ui.enabled }}
            - name: ui
              containerPort: {{ .Values.ui.port }}
              protocol: TCP
            {{- end }}
            {{- if .Values.docs.enabled }}
            - name: docs
              containerPort: {{ .Values.docs.port }}
              protocol: TCP
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources: {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 1Mi
