{{- if .Values.networkPolicy.enabled }}
# Operator NetworkPolicy — restricts egress to the Kubernetes API and
# storage destinations. DNS (port 53) is always allowed so in-cluster
# name resolution works.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "backup-operator.fullname" . }}
  labels: {{- include "backup-operator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "backup-operator.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    # DNS resolution (CoreDNS / kube-dns)
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Kubernetes API server
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    # SFTP destinations (SSH)
    - ports:
        - protocol: TCP
          port: 22
        - protocol: TCP
          port: 23  # Hetzner Storage Box
    # S3-compatible storage (HTTPS)
    - ports:
        - protocol: TCP
          port: 443
    # Metrics scraping (Prometheus pulls, no egress needed)
    {{- with .Values.networkPolicy.extraEgressRules }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
