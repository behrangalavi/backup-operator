{{- if .Values.rbac.create -}}
# Operator Role — manages CronJobs, watches Secrets/Jobs, leader election.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "backup-operator.fullname" . }}
  labels: {{- include "backup-operator.labels" . | nindent 4 }}
rules:
  # Operator reconciles source/destination Secrets into CronJobs.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]

  # Operator — manages CronJobs as the per-source materialised schedule.
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Operator — observes Jobs spawned by CronJobs (so reconciler sees status).
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]

  # Operator — leader election lease.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Operator — MetricsRefresher and UI may emit events in future.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "backup-operator.fullname" . }}
  labels: {{- include "backup-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "backup-operator.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "backup-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
# Worker Role — minimal privileges: read Secrets, emit audit events.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "backup-operator.fullname" . }}-worker
  labels: {{- include "backup-operator.labels" . | nindent 4 }}
rules:
  # Worker reads the source Secret it was pointed at and lists destinations.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]

  # Worker — audit-trail events attached to source Secrets.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "backup-operator.fullname" . }}-worker
  labels: {{- include "backup-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "backup-operator.fullname" . }}-worker
subjects:
  - kind: ServiceAccount
    name: {{ include "backup-operator.fullname" . }}-worker
    namespace: {{ .Release.Namespace }}
{{- end }}
