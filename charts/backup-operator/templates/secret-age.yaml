{{- if not .Values.agePublicKeys -}}
{{- fail "agePublicKeys is required: set at least one age recipient public key (age1...)" -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "backup-operator.fullname" . }}-age
  labels: {{- include "backup-operator.labels" . | nindent 4 }}
stringData:
  AGE_PUBLIC_KEYS: |-
    {{- .Values.agePublicKeys | nindent 4 }}
