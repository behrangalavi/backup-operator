{{define "style"}}<style>
:root{
  --fg:#1a1a1a; --bg:#fafafa; --muted:#666; --line:#e3e3e3;
  --ok:#1f7a3a; --bad:#b3261e; --accent:#2f5fa1;
  --pill-postgres:#336791; --pill-mysql:#00758f; --pill-mongo:#13aa52;
}
*{box-sizing:border-box}
body{font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif;color:var(--fg);background:var(--bg);max-width:1100px;margin:2rem auto;padding:0 1.5rem}
header{margin-bottom:2rem}
h1{font-size:1.6rem;margin:0 0 .25rem}
h2{font-size:1.1rem;margin:1.5rem 0 .5rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
code{font:13px/1 ui-monospace,Menlo,monospace;background:#eee;padding:.1em .35em;border-radius:3px}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.subtle{color:var(--muted)}
.empty{color:var(--muted);font-style:italic;padding:2rem 0}
.ok{color:var(--ok);font-weight:500}
.bad{color:var(--bad);font-weight:500}
.num{text-align:right;font-variant-numeric:tabular-nums}
table{width:100%;border-collapse:collapse;margin:0 0 1rem}
th,td{padding:.5rem .6rem;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
th{font-weight:600;font-size:12px;text-transform:uppercase;color:var(--muted);letter-spacing:.04em}
tr:hover td{background:#fff}
.pill{display:inline-block;padding:.1em .55em;border-radius:10px;font-size:11px;font-weight:600;color:#fff;text-transform:uppercase;letter-spacing:.04em}
.pill-postgres{background:var(--pill-postgres)}
.pill-mysql{background:var(--pill-mysql)}
.pill-mongo{background:var(--pill-mongo)}
dl{display:grid;grid-template-columns:max-content 1fr;gap:.25rem 1rem;margin:.5rem 0}
dt{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.04em;align-self:center}
dd{margin:0}
footer{margin-top:3rem;padding-top:1rem;border-top:1px solid var(--line);color:var(--muted);font-size:12px}
.dl a{display:inline-block;padding:.15em .5em;margin-right:.25em;border:1px solid var(--line);border-radius:4px;font-size:11px;font-family:ui-monospace,Menlo,monospace}
.dl a:hover{background:#fff;text-decoration:none}
</style>{{end}}
